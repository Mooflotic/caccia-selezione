const IMG  = {};
const LIGHT = true;
const LET=['A','B','C','D'];
let fMod='Tutti', fQ='';
const $=s=>document.querySelector(s);
$('#tot').textContent=BANK.length;

let flagged=new Set();
try{ const s=localStorage.getItem('caccia_flags'); if(s) flagged=new Set(JSON.parse(s)); }catch(e){}
function saveFlags(){ try{ localStorage.setItem('caccia_flags', JSON.stringify([...flagged])); }catch(e){} }
function flagBtnHtml(idx){ if(LIGHT) return ''; const on=flagged.has(idx); return '<button class="flagbtn'+(on?' on':'')+'" data-flag="'+idx+'">'+(on?'✓ Segnalata':'⚠ Segnala ortografia')+'</button>'; }
let marks=new Set();
try{ const s=localStorage.getItem('caccia_marks'); if(s) marks=new Set(JSON.parse(s)); }catch(e){}
function saveMarks(){ try{ localStorage.setItem('caccia_marks', JSON.stringify([...marks])); }catch(e){} }
function markBtnHtml(idx){ const on=marks.has(idx); return '<button class="markbtn'+(on?' on':'')+'" data-mark="'+idx+'">'+(on?'★ Nei preferiti':'☆ Aggiungi ai preferiti')+'</button>'; }
function updateFlagInfo(){
  if(LIGHT) return;
  const n=flagged.size, el=$('#flagInfo'), btn=$('#exportBtn');
  el.textContent = n ? ('⚠ '+n+(n>1?' domande segnalate':' domanda segnalata')) : 'Nessuna segnalazione ortografica';
  el.classList.toggle('has', n>0); btn.disabled = n===0;
}

function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function hl(text, q){
  if(!q) return escapeHtml(text);
  const t=escapeHtml(text); const nt=norm(t), nq=norm(q);
  let out='', i=0;
  while(true){ const k=nt.indexOf(nq,i); if(k<0){out+=t.slice(i);break;} out+=t.slice(i,k)+'<mark>'+t.slice(k,k+q.length)+'</mark>'; i=k+q.length; }
  return out;
}
function escapeHtml(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function matches(it,idx){
  if(fMod==='★'){ if(!marks.has(idx)) return false; }
  else if(fMod!=='Tutti' && it.m!==fMod) return false;
  if(fQ){ const blob=norm([it.stem,it.A,it.B,it.C,it.D,it.id,it.m].join(' ')); if(!blob.includes(norm(fQ))) return false; }
  return true;
}

function render(){
  const list=$('#list'); list.innerHTML='';
  let n=0; const frag=document.createDocumentFragment();
  BANK.forEach((it,idx)=>{
    if(!matches(it,idx)) return; n++;
    const d=document.createElement('div'); d.className='card';
    let h='<span class="badge">'+it.m+' · id '+it.id+'</span>';
    h+='<div class="stem">'+hl(it.stem,fQ)+'</div>';
    if(it.parsed){
      LET.forEach(L=>{
        const right=L===it.ans;
        h+='<div class="opt'+(right?' right':'')+'"><span class="lt">'+L+'</span><span class="tx">'+hl(it[L]||'',fQ)+'</span></div>';
      });
    } else {
      h+='<div class="opt right"><span class="lt">'+it.ans+'</span><span class="tx">Risposta corretta: '+it.ans+' — opzioni nell\'immagine</span></div>';
    }
    if(!LIGHT){ h+='<button class="imgbtn" data-idx="'+idx+'">🖼️ Mostra immagine originale</button>'; }
    h+=markBtnHtml(idx)+flagBtnHtml(idx);
    if(!LIGHT){ h+='<div class="imgwrap" id="iw'+idx+'"></div>'; }
    d.innerHTML=h; frag.appendChild(d);
  });
  list.appendChild(frag);
  if(n===0) list.innerHTML='<div class="empty">Nessuna domanda trovata.</div>';
  $('#count').textContent=n+' / '+BANK.length;
}

document.addEventListener('click',e=>{
  const mb=e.target.closest('.markbtn');
  if(mb){ const idx=+mb.dataset.mark; if(marks.has(idx)) marks.delete(idx); else marks.add(idx); saveMarks();
    document.querySelectorAll('.markbtn[data-mark="'+idx+'"]').forEach(b=>{ const on=marks.has(idx); b.classList.toggle('on',on); b.textContent=on?'★ Nei preferiti':'☆ Aggiungi ai preferiti'; });
    if(fMod==='★') render(); return; }
  const im=e.target.closest('.imln');
  if(im){ const ix=+im.dataset.imln; const st=loadStats(); if(st[ix]){ st[ix].bad=false; saveStats(st); } renderReview(); return; }
  const fb=e.target.closest('.flagbtn');
  if(fb){ const idx=+fb.dataset.flag;
    if(flagged.has(idx)) flagged.delete(idx); else flagged.add(idx);
    saveFlags(); updateFlagInfo();
    document.querySelectorAll('.flagbtn[data-flag="'+idx+'"]').forEach(b=>{ const on=flagged.has(idx); b.classList.toggle('on',on); b.textContent=on?'✓ Segnalata':'⚠ Segnala ortografia'; });
    return; }
  const b=e.target.closest('.imgbtn'); if(!b) return;
  const idx=+b.dataset.idx; const w=$('#iw'+idx);
  if(w.classList.contains('show')){ w.classList.remove('show'); b.textContent='🖼️ Mostra immagine originale'; }
  else { if(!w.dataset.loaded){ w.innerHTML='<img src="data:image/jpeg;base64,'+IMG[idx]+'" alt="Domanda '+idx+'">'; w.dataset.loaded='1'; }
         w.classList.add('show'); b.textContent='Nascondi immagine'; }
});

let t=null;
$('#q').addEventListener('input',e=>{ fQ=e.target.value.trim(); clearTimeout(t); t=setTimeout(render,120); });
document.querySelectorAll('.pill[data-m]').forEach(p=>p.onclick=()=>{
  fMod=p.dataset.m; document.querySelectorAll('.pill[data-m]').forEach(x=>x.classList.toggle('active',x===p)); render();
});

/* ===== Modalità & Esame ===== */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const NQ=25, PASSN=20;
const PROVE={
  censitore:{label:'Censitore', sub:'Operatore abilitato ai censimenti', mods:['Censitore','Base']},
  selecontrollore:{label:'Selecontrollore', sub:'Cacciatore di selezione', mods:['Selezione','Base']}
};
let mode='browse', exam=null, prova='censitore';
function provaPool(){ const mods=PROVE[prova].mods; return [...Array(BANK.length).keys()].filter(i=>mods.includes(BANK[i].m)); }
function provaStats(k){
  const mods=PROVE[k].mods;
  const pool=[...Array(BANK.length).keys()].filter(i=>mods.includes(BANK[i].m));
  let seenSet; try{ seenSet=new Set(JSON.parse(localStorage.getItem('caccia_examSeen_v1_'+k)||'[]')); }catch(e){ seenSet=(memSeen[k]||new Set()); }
  const seen=pool.filter(i=>seenSet.has(i)).length;
  return {total:pool.length, seen:seen, notSeen:pool.length-seen};
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  $('#browseHead').hidden=(m!=='browse'); $('#browse').hidden=(m!=='browse');
  $('#examHead').hidden=(m!=='exam'); $('#exam').hidden=(m!=='exam');
  $('#review').hidden=(m!=='review');
  if(m==='exam') updateSeenInfo();
  if(m==='review') renderReview();
  window.scrollTo({top:0});
}
const SEEN_KEY='caccia_examSeen_v1'; let memSeen={};
function seenKey(){ return SEEN_KEY+'_'+prova; }
function loadSeen(){ try{ return new Set(JSON.parse(localStorage.getItem(seenKey())||'[]')); }catch(e){ return memSeen[prova]||(memSeen[prova]=new Set()); } }
function saveSeen(s){ memSeen[prova]=s; try{ localStorage.setItem(seenKey(), JSON.stringify([...s])); }catch(e){} }
(function migrateSeen(){
  try{
    const old=localStorage.getItem(SEEN_KEY); if(old===null) return;
    const oldSet=new Set(JSON.parse(old));
    Object.keys(PROVE).forEach(k=>{
      const nk=SEEN_KEY+'_'+k; if(localStorage.getItem(nk)!==null) return;
      const mods=PROVE[k].mods;
      const seed=[...oldSet].filter(i=>BANK[i]&&mods.includes(BANK[i].m));
      localStorage.setItem(nk, JSON.stringify(seed));
    });
  }catch(e){}
})();
function updateSeenInfo(){ const el=$('#seenInfo'); if(!el) return; const pool=provaPool(); el.textContent='Prova '+PROVE[prova].label+' · domande già viste: '+loadSeen().size+' / '+pool.length; }
const STATS_KEY='caccia_stats_v1'; let memStats=null;
function loadStats(){ try{ return JSON.parse(localStorage.getItem(STATS_KEY)||'{}'); }catch(e){ return memStats||(memStats={}); } }
function saveStats(o){ memStats=o; try{ localStorage.setItem(STATS_KEY, JSON.stringify(o)); }catch(e){} }
function startExam(){
  const pool=provaPool();
  let seen=loadSeen();
  let unseen=pool.filter(i=>!seen.has(i)); shuffle(unseen);
  let order, cycled=false;
  if(unseen.length>=NQ){ order=unseen.slice(0,NQ); order.forEach(i=>seen.add(i)); }
  else { cycled=true; order=unseen.slice(); seen=new Set(order);
    let rest=pool.filter(i=>!seen.has(i)); shuffle(rest);
    const extra=rest.slice(0,NQ-order.length); order=order.concat(extra); extra.forEach(i=>seen.add(i)); }
  shuffle(order); saveSeen(seen);
  exam={order, ans:{}, pos:0, done:false, prova}; updateSeenInfo();
  if(cycled){ const el=$('#seenInfo'); if(el) el.textContent='✓ Hai completato tutte le '+pool.length+' domande della prova '+PROVE[prova].label+' — nuovo giro iniziato!'; }
  renderExam();
}
function startChoosing(){
  const eh=$('#examHead'); if(eh){ eh.classList.add('choosing'); eh.classList.remove('running'); }
  const hd=document.querySelector('.head'); if(hd) hd.classList.remove('inexam');
  document.querySelectorAll('.provabtn').forEach(x=>x.classList.remove('active'));
  const cs=provaStats('censitore'), ss=provaStats('selecontrollore');
  const row=(t,sub,st)=>'<div class="provastat"><b>'+t+'</b> — '+sub+'<br><span class="seen">'+st.seen+' viste</span> · <span class="unseen">'+st.notSeen+' da vedere</span> · '+st.total+' totali</div>';
  $('#exam').innerHTML='<div class="card chooseHint">Scegli la <b>prova d\u2019esame</b> qui sopra per iniziare:'
    +row('Censitore','operatore abilitato ai censimenti',cs)
    +row('Selecontrollore','cacciatore di selezione',ss)
    +'<div class="provanote">25 domande, ammesso con 20/25.</div></div>';
  updateSeenInfo();
}
function renderExam(){
  const eh=$('#examHead'); if(eh){ eh.classList.add('running'); eh.classList.remove('choosing'); }
  const hd=document.querySelector('.head'); if(hd) hd.classList.add('inexam');
  const N=exam.order.length, ix=exam.order[exam.pos], it=BANK[ix];
  $('#exprog').textContent=(exam.pos+1)+' / '+N;
  let h='<div class="card"><span class="badge">'+(exam.training?'🎯 ripasso · ':'')+it.m+'</span>';
  h+='<div class="stem">'+escapeHtml(it.stem)+'</div>';
  LET.forEach(L=>{ const sel=exam.ans[exam.pos]===L;
    h+='<div class="exopt'+(sel?' sel':'')+'" data-l="'+L+'"><span class="lt">'+L+'</span><span class="tx">'+escapeHtml(it[L]||'')+'</span></div>'; });
  h+='</div>';
  h+='<div class="exbar"><i style="width:'+Math.round((exam.pos+1)/N*100)+'%"></i></div>';
  h+='<div class="navrow"><button class="btn s sm" id="prevQ"'+(exam.pos===0?' disabled':'')+'>← Indietro</button>';
  h+='<span class="ansN">Risposte: '+Object.keys(exam.ans).length+' / '+N+'</span>';
  h+='<button class="btn s sm" id="nextQ"'+(exam.pos===N-1?' disabled':'')+'>Avanti →</button></div>';
  h+='<div class="palette">';
  for(let i=0;i<N;i++){ h+='<button class="pq'+(i===exam.pos?' cur':'')+(exam.ans[i]!==undefined?' done':'')+'" data-pos="'+i+'">'+(i+1)+'</button>'; }
  h+='</div>';
  h+=flagBtnHtml(ix);
  $('#exam').innerHTML=h;
  document.querySelectorAll('.exopt').forEach(o=>o.onclick=()=>{ exam.ans[exam.pos]=o.dataset.l; renderExam(); });
  document.querySelectorAll('.pq').forEach(b=>b.onclick=()=>{ exam.pos=+b.dataset.pos; renderExam(); window.scrollTo({top:0}); });
  const pv=$('#prevQ'), nx=$('#nextQ');
  if(pv) pv.onclick=()=>{ exam.pos--; renderExam(); window.scrollTo({top:0}); };
  if(nx) nx.onclick=()=>{ exam.pos++; renderExam(); window.scrollTo({top:0}); };
}
const HIST_KEY='caccia_examHist_v1';
function loadHist(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)||'[]'); }catch(e){ return []; } }
function saveHist(a){ try{ localStorage.setItem(HIST_KEY, JSON.stringify(a)); }catch(e){} }
function submitExam(){
  const N=exam.order.length, dato=Object.keys(exam.ans).length;
  if(dato<N && !confirm('Hai risposto a '+dato+' domande su '+N+'. Consegnare comunque?')) return;
  let correct=0; const wrong=[];
  exam.order.forEach((ix,pos)=>{ const a=exam.ans[pos]; if(a===BANK[ix].ans) correct++; else wrong.push(pos); });
  exam.done=true; exam.correct=correct; exam.wrong=wrong; exam.review='all';
  const st=loadStats();
  exam.order.forEach((ix,pos)=>{ const a=exam.ans[pos]; if(a===undefined) return; const s=st[ix]||(st[ix]={w:0,n:0}); s.n++; if(a!==BANK[ix].ans){ s.w++; s.bad=true; } else { s.bad=false; } });
  saveStats(st);
  if(!exam.training){ const hist=loadHist(); hist.push(correct); while(hist.length>20) hist.shift(); saveHist(hist);
    const pass=correct>=PASSN;
    const pv=exam.prova||prova;
    try{ var gc=window.parent&&window.parent.goatcounter; if(gc&&gc.count){ gc.count({path:'esame-'+pv+'-'+(pass?'ammesso':'respinto'),event:true}); gc.count({path:'voto-'+pv+'-'+correct+'su25',event:true}); } }catch(e){}
  }
  $('#exprog').textContent='Risultato';
  renderResult();
}
function reviewCard(pos){ const ix=exam.order[pos], it=BANK[ix], a=exam.ans[pos], ok=(a===it.ans);
  let h='<div class="card"><span class="badge">'+it.m+' · id '+it.id+' · '+(ok?'<span class="okt">giusta ✓</span>':'<span class="kot">errata</span>')+'</span><div class="stem">'+escapeHtml(it.stem)+'</div>';
  LET.forEach(L=>{ let cls=''; if(L===it.ans) cls=' right'; else if(L===a) cls=' chosen';
    h+='<div class="opt'+cls+'"><span class="lt">'+L+'</span><span class="tx">'+escapeHtml(it[L]||'')+'</span></div>'; });
  if(a===undefined) h+='<div class="norisp">Non hai risposto a questa domanda.</div>';
  h+=markBtnHtml(ix)+(LIGHT?'':'<button class="imgbtn" data-idx="'+ix+'">🖼️ Mostra immagine originale</button>')+flagBtnHtml(ix)+(LIGHT?'':'<div class="imgwrap" id="iw'+ix+'"></div>')+'</div>';
  return h; }
function renderResult(){
  const eh=$('#examHead'); if(eh){ eh.classList.remove('running'); eh.classList.add('choosing'); }
  const hd=document.querySelector('.head'); if(hd) hd.classList.remove('inexam');
  const N=exam.order.length, correct=exam.correct, wrong=exam.wrong, pass=correct>=PASSN, tr=exam.training;
  let h='<div class="result '+(tr?'':(pass?'pass':'fail'))+'"><div class="big">'+correct+' / '+N+'</div>';
  if(tr){ h+='<div class="pf">Ripasso completato — '+correct+'/'+N+' giuste'+(correct<N?'. Le sbagliate restano in lista.':' 🎯')+'</div>'; }
  else { const pv=PROVE[exam.prova||prova]; h+='<div class="pf">Prova '+pv.label+' — '+(pass?'✓ AMMESSO':'✗ NON ammesso')+' &nbsp;('+correct+'/'+N+' corrette — servono 20 per essere ammessi)</div>'; }
  h+='<button class="btn p" id="newEx">'+(tr?'↻ Continua ripasso':'↻ Nuovo esame')+'</button></div>';
  h+='<div class="rvtabs"><button class="rvtab'+(exam.review==='all'?' active':'')+'" data-rv="all">Rivedi tutte ('+N+')</button>';
  h+='<button class="rvtab'+(exam.review==='wrong'?' active':'')+'" data-rv="wrong">Solo errori ('+wrong.length+')</button></div>';
  if(exam.review==='wrong'){
    if(wrong.length) wrong.forEach(p=>{ h+=reviewCard(p); });
    else h+='<div class="empty">Tutte corrette! 🎯</div>';
  } else { exam.order.forEach((_,p)=>{ h+=reviewCard(p); }); }
  $('#exam').innerHTML=h; window.scrollTo({top:0});
  $('#newEx').onclick = tr ? startTraining : startExam;
  document.querySelectorAll('.rvtab').forEach(b=>b.onclick=()=>{ exam.review=b.dataset.rv; renderResult(); });
}
function errorPool(){ const st=loadStats(); return Object.keys(st).map(k=>+k).filter(ix=>st[ix]&&st[ix].w>0&&st[ix].bad!==false).sort((a,b)=> (st[b].w-st[a].w) || ((st[b].w/st[b].n)-(st[a].w/st[a].n)) ); }
function startTraining(){
  const pool=errorPool();
  if(!pool.length){ alert('Non hai (più) domande da ripassare. Ottimo lavoro!'); setMode('review'); return; }
  const ord=pool.slice(); shuffle(ord); const order=ord.slice(0, Math.min(ord.length, NQ));
  exam={order, ans:{}, pos:0, done:false, training:true};
  setMode('exam');
  const el=$('#seenInfo'); if(el) el.textContent='🎯 Ripasso mirato — '+order.length+' domande dai tuoi errori';
  renderExam();
}
function progressPanel(){
  const st=loadStats(); const ixs=Object.keys(st).map(k=>+k);
  const tent=ixs.filter(ix=>st[ix].n>0).length;
  const ripassare=ixs.filter(ix=>st[ix]&&st[ix].w>0&&st[ix].bad!==false).length;
  const padron=tent-ripassare;
  const hist=loadHist(); const last=hist.slice(-5); const avg=last.length?Math.round(last.reduce((a,b)=>a+b,0)/last.length):null;
  let h='<div class="prog">';
  h+='<div class="pstat"><b>'+tent+'</b><span>tentate</span></div>';
  h+='<div class="pstat ok"><b>'+padron+'</b><span>padroneggiate</span></div>';
  h+='<div class="pstat bad"><b>'+ripassare+'</b><span>da ripassare</span></div>';
  h+='<div class="pstat"><b>'+(avg!==null?avg+'/25':'—')+'</b><span>media esami</span></div>';
  h+='</div>';
  return h;
}
function renderReview(){
  const st=loadStats(); const items=errorPool();
  let h=progressPanel();
  if(!items.length){ h+='<div class="empty">Nessuna domanda da ripassare in questo momento.<br>Fai qualche simulazione: le domande che sbagli compariranno qui.</div>'; }
  else {
    h+='<button class="btn p train" id="trainBtn">🎯 Allenati sui tuoi errori ('+items.length+')</button>';
    h+='<div class="rvinfo">Ordinate dalle più sbagliate · "Imparata" o una risposta giusta le rimuove. <button class="lnk" id="resetStats">azzera statistiche</button></div>';
    items.forEach(ix=>{ const it=BANK[ix], s=st[ix];
      h+='<div class="card"><span class="badge">'+it.m+' · id '+it.id+' · <span class="kot">sbagliata '+s.w+(s.w===1?' volta':' volte')+(s.n>s.w?' su '+s.n+' tentativi':'')+'</span></span><div class="stem">'+escapeHtml(it.stem)+'</div>';
      LET.forEach(L=>{ h+='<div class="opt'+(L===it.ans?' right':'')+'"><span class="lt">'+L+'</span><span class="tx">'+escapeHtml(it[L]||'')+'</span></div>'; });
      h+='<button class="imln" data-imln="'+ix+'">✓ Imparata</button>'+markBtnHtml(ix);
      h+=(LIGHT?'':'<button class="imgbtn" data-idx="'+ix+'">🖼️ Mostra immagine originale</button>')+flagBtnHtml(ix)+(LIGHT?'':'<div class="imgwrap" id="iw'+ix+'"></div>')+'</div>';
    });
  }
  $('#review').innerHTML=h;
  const tb=$('#trainBtn'); if(tb) tb.onclick=startTraining;
  const rs=$('#resetStats'); if(rs) rs.onclick=()=>{ if(confirm('Azzerare tutte le statistiche degli errori? La lista verrà svuotata.')){ saveStats({}); renderReview(); } };
}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{ const m=b.dataset.mode; setMode(m); if(m==='exam' && (!exam||exam.done)) startChoosing(); });
$('#submitEx').onclick=submitExam;
$('#newExHead').onclick=()=>{ if(!exam||exam.done||confirm('Iniziare un nuovo esame della stessa prova? Le risposte attuali andranno perse.')) startExam(); };
$('#switchExHead').onclick=()=>{ if(!exam||exam.done||confirm('Cambiare prova? L\u2019esame in corso andrà perso.')) startChoosing(); };
document.querySelectorAll('.provabtn').forEach(b=>b.onclick=()=>{
  const p=b.dataset.prova;
  if(exam && !exam.done && Object.keys(exam.ans).length && !confirm('Cambiare prova? L\u2019esame in corso andrà perso.')) return;
  prova=p; document.querySelectorAll('.provabtn').forEach(x=>x.classList.toggle('active',x===b));
  startExam();
});
$('#resetSeen').onclick=()=>{ if(confirm('Azzerare la cronologia delle domande già viste della prova '+PROVE[prova].label+'?')){ saveSeen(new Set()); updateSeenInfo(); } };

function buildExport(){
  const ids=[...flagged].sort((a,b)=>a-b);
  let out='SEGNALAZIONI ORTOGRAFIA — '+ids.length+' domande\n\n';
  ids.forEach(ix=>{ const it=BANK[ix];
    out+='['+it.m+'] id '+it.id+'\n';
    out+='D: '+it.stem+'\n';
    LET.forEach(L=>{ out+='   '+L+') '+(it[L]||'')+'\n'; });
    out+='Risposta corretta: '+it.ans+'\n';
    out+='----------------------------------------\n';
  });
  return out;
}
if(!LIGHT){
$('#exportBtn').onclick=()=>{ if(!flagged.size) return; $('#expText').value=buildExport(); $('#expModal').hidden=false; };
$('#expClose').onclick=()=>{ $('#expModal').hidden=true; };
$('#expModal').addEventListener('click',e=>{ if(e.target.id==='expModal') $('#expModal').hidden=true; });
$('#expCopy').onclick=()=>{ const ta=$('#expText'); ta.focus(); ta.select(); ta.setSelectionRange(0,999999);
  let ok=false; try{ ok=document.execCommand('copy'); }catch(e){}
  $('#expCopy').textContent= ok?'✓ Copiato':'Seleziona e copia'; setTimeout(()=>$('#expCopy').textContent='📋 Copia',1600); };
$('#expDl').onclick=()=>{ try{ const blob=new Blob([$('#expText').value],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='segnalazioni_ortografia.txt'; document.body.appendChild(a); a.click(); a.remove(); }catch(e){ alert('Download non riuscito: copia il testo manualmente.'); } };
$('#expClear').onclick=()=>{ if(!flagged.size) return; if(confirm('Rimuovere tutte le '+flagged.size+' segnalazioni?')){ flagged.clear(); saveFlags(); updateFlagInfo(); document.querySelectorAll('.flagbtn.on').forEach(b=>{ b.classList.remove('on'); b.textContent='⚠ Segnala ortografia'; }); $('#expModal').hidden=true; } };
}

setMode('browse');
render();
updateFlagInfo();

<main>
  <div id="rip-dent">
<details open><summary>📖 Ripasso lampo — Dentizione</summary>
<h3>Conteggio denti (dentatura completata)</h3>
<table>
<tr><th></th><th>Capriolo</th><th>Cervo</th><th>Daino</th><th>Muflone</th><th>Cinghiale</th></tr>
<tr><th>Emimandibola (inf.)</th><td>10</td><td>10</td><td>10</td><td>10</td><td>11</td></tr>
<tr><th>Emimascella (sup.)</th><td>6</td><td class="hot">7</td><td>6</td><td>6</td><td>11</td></tr>
<tr><th>Totale denti</th><td>32</td><td class="hot">34</td><td>32</td><td>32</td><td>44</td></tr>
</table>
<p class="tip">Il <b>cervo</b> ha <b>7</b> in emimascella (e <b>34</b> totali) perché possiede i <b>canini superiori</b>. I bovidi (muflone) hanno <b>32</b> denti. Cinghiale = 11/11 (44 totali); nell'emimandibola ha <b>4 premolari</b>.</p>
<h3>Denti da latte alla nascita</h3>
<table>
<tr><th>Capriolo</th><th>Cervo</th><th>Daino</th><th>Muflone</th><th>Cinghiale</th></tr>
<tr><td class="hot">22</td><td>22</td><td>20</td><td>20</td><td>8</td></tr>
</table>
<p class="tip">⚠ <b>Capriolo</b>: il cheat-sheet riportava 20, ma la <b>risposta d'esame è 22</b>. Muflone (20) = 6 incisivi + 2 canini <i>già presenti</i> + 12 premolari <i>in eruzione</i>.</p>
<h3>Eruzione del 1° molare (M1)</h3>
<p>Capriolo <b>3-4 mesi</b> &nbsp;·&nbsp; Cervo <b>4-5 mesi</b> &nbsp;·&nbsp; Daino <b>3-4 mesi</b> &nbsp;·&nbsp; Cinghiale <b>~6 mesi</b>.</p>
<h3>Sostituzione di TUTTI i premolari da latte</h3>
<p>Capriolo <b>12-14 mesi</b> &nbsp;·&nbsp; Cervo <b>21-25 mesi</b> &nbsp;·&nbsp; Daino <b>21-26 mesi</b> &nbsp;·&nbsp; Muflone <b>26-32 mesi</b>.</p>
<h3>Da ricordare</h3>
<ul>
<li><b>Ultimo dente da latte</b> sostituito = <b>I2</b> (2° incisivo), insieme all'eruzione del <b>3° molare</b>.</li>
<li><b>Ultimo dente definitivo a comparire</b> = <b>P1</b> (1° premolare).</li>
<li>A dentatura completata, l'<b>unico criterio</b> per stimare l'età = <b>grado di usura</b> dei denti.</li>
<li><b>Diastema</b> = spazio senza denti fra canini e premolari (tipico dei ruminanti).</li>
<li><b>Incisivi superiori</b>: assenti nei ruminanti, presenti solo nel <b>cinghiale</b>.</li>
<li><b>Canini superiori</b>: presenti in <b>cervo e cinghiale</b>.</li>
<li><b>Picozzi</b> = incisivi centrali (I1) del cervo (più grandi).</li>
<li><b>Cinghiale</b>: il <b>P1</b> dell'emimandibola è separato, piccolo, a volte manca; incisivi inferiori <i>a scalpello</i> (scavo); i canini ("zanne") escono dalla rima labiale dal <b>3°-4° anno</b>.</li>
</ul>

<details open><summary>📖 Ripasso lampo — Periodi &amp; Fasi</summary>
<h3>Periodo riproduttivo (amori)</h3>
<table>
<tr><th>Capriolo</th><td>metà luglio – agosto &nbsp;(<i>diapausa embrionale</i>: impianto a dicembre)</td></tr>
<tr><th>Cervo (bramito)</th><td>metà settembre – metà ottobre</td></tr>
<tr><th>Daino</th><td>ottobre</td></tr>
<tr><th>Muflone</th><td>ottobre – inizio dicembre</td></tr>
<tr><th>Cinghiale</th><td>accoppiamenti in autunno-inverno; <b>nascite</b> (annate normali) ~ <b>maggio</b></td></tr>
</table>
<h3>Muta del mantello</h3>
<p><b>Invernale → estivo</b> (primavera): aprile / fine aprile–maggio (secondo la specie).<br>
<b>Estivo → invernale</b> (autunno): fine settembre–ottobre / fine ottobre–novembre.</p>
<h3>🦌 Il ciclo del palco</h3>
<div class="didattica">
<p>I <b>palchi</b> sono strutture <b>ossee e caduche</b>: si rinnovano ogni anno e sono tipici dei <b>cervidi</b> maschi (capriolo, cervo, daino). Le <b>corna</b> del <b>muflone</b> (Bovide) sono di sostanza cornea, <b>permanenti, a crescita continua</b> (in inverno si forma l'<i>anello di pausa</i>).</p>
<p><b>Le 4 fasi del ciclo (cervidi):</b></p>
<ol class="steps">
<li><b>Caduta</b> del vecchio palco (rosso nel calendario).</li>
<li><b>Ricrescita in velluto</b> (verde chiaro): pelle vascolarizzata che nutre l'osso; dura ~3-4 mesi.</li>
<li><b>Pulizia del velluto</b> (sfregamento = "fregoni") a sviluppo completo &rarr; palco <b>duro/ossificato</b> (verde scuro) per gli amori.</li>
<li>Al calare degli ormoni, nuova <b>caduta</b> &rarr; il ciclo ricomincia.</li>
</ol>
<p><b>Ordine di caduta:</b> prima il <b>cervo</b> (fine feb&ndash;mar), poi il <b>daino</b> (apr&ndash;mag), per ultimo il <b>capriolo</b> (autunno, fine ott&ndash;dic; unico con ricrescita invernale). Pulizia velluto: cervo &asymp; luglio, daino &asymp; agosto&ndash;settembre.</p>
<p><b>Ormoni:</b> il <b>testosterone</b> (testicoli) ossifica il palco e fa cadere il velluto; il suo <b>calo</b> provoca il distacco del palco e l'avvio della ricrescita. La <b>somatotropina</b> (ipofisi) &egrave; l'ormone della <i>crescita</i> dei palchi, antagonista del testosterone. Trofeo <b>"a parrucca"</b> = mancata/insufficiente produzione di testosterone.</p>
<p><b>Elementi del palco:</b> <b>stelo</b> = pedicello (supporto osseo); <b>rose</b> = basi/corona; <b>perle</b> = escrescenze a goccia; <b>pale</b> (solo daino). Cervo e daino iniziano i <b>primi palchi a 9/10 mesi</b>; i <b>fusoni</b> (1&deg; palco) cadono a <b>21/22 mesi</b> nel cervo e <b>11/12 mesi</b> nel daino.</p>

<h3>Fasi annuali dei MASCHI (cervidi/daino)</h3>
<ul>
<li><b>Territoriale</b>: difesa del territorio; comprende gli amori.</li>
<li><b>Gerarchica</b> (capriolo, ~metà mar–metà apr): gruppi unisessuali, aggressività crescente, parate e confronti.</li>
<li><b>Indifferente</b>: periodo "neutro", senza territorialità né gerarchia (es. <b>daino: novembre–inizio dicembre</b>).</li>
<li><b>Raggruppamento</b>: formazione dei grandi gruppi (autunno–inverno).</li>
</ul>
<h3>Fasi annuali delle FEMMINE</h3>
<ul>
<li><b>Parentale</b>: subito dopo il parto; la femmina può proseguire il territorialismo (capriolo). Daino ♀: <b>mag/giu – fine settembre</b>.</li>
<li><b>Raggruppamento</b> (daino ♀): <b>fine ottobre – metà marzo</b>.</li>
<li>Scioglimento dei gruppi invernali → <b>parti</b>.</li>
</ul>
<p class="tip">I versanti esposti a <b>sud/sud-ovest</b> sono importanti in <b>inverno</b> (meno neve) per muflone e cervo.</p>

const IMG={};
const LIGHT=true;
const LET=['A','B','C','D'];
let theme='dent', order=[], pos=0, correct=0, seen=0, answered=false;
const $=s=>document.querySelector(s);
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startTheme(t){
  theme=t; document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.t===t));
  $('#rip-dent').hidden=(t!=='dent'); $('#rip-peri').hidden=(t!=='peri');
  order=shuffle(DATA[t].map((_,i)=>i)); pos=0; correct=0; seen=0; answered=false; render();
}
function render(){
  const arr=DATA[theme];
  if(pos>=order.length){ summary(); return; }
  const it=arr[order[pos]]; answered=false;
  $('#prog').textContent='Domanda '+(pos+1)+' / '+order.length;
  $('#score').textContent=seen?('✓ '+correct+'/'+seen):'';
  let h='<div class="meta">'+it.m+' · id '+it.id+'</div><div class="stem">'+esc(it.q)+'</div>';
  it.o.forEach((opt,k)=>{ h+='<div class="opt" data-k="'+k+'"><span class="lt">'+LET[k]+'</span><span>'+esc(opt)+'</span></div>'; });
  h+='<div id="fb"></div>';
  if(!LIGHT){ h+='<div class="row" id="row"><button class="btn s" id="imgb">🖼️ Mostra immagine</button></div>'; h+='<div class="imgwrap" id="iw"></div>'; }
  $('#card').innerHTML=h;
  document.querySelectorAll('.opt').forEach(o=>o.onclick=()=>answer(+o.dataset.k));
  if(!LIGHT){ const ib=$('#imgb'); if(ib) ib.onclick=toggleImg; }
}
function answer(k){
  if(answered) return; answered=true; seen++;
  const it=DATA[theme][order[pos]]; const ok=(k===it.a);
  if(ok) correct++;
  document.querySelectorAll('.opt').forEach(o=>{
    const kk=+o.dataset.k; o.classList.add('dis'); o.onclick=null;
    if(kk===it.a) o.classList.add('ok');
    else if(kk===k) o.classList.add('no');
  });
  const fb=$('#fb'); fb.className='fb '+(ok?'ok':'no');
  fb.textContent=ok?'✓ Corretta!':('✗ Sbagliata — la risposta giusta è '+LET[it.a]+'.');
  $('#score').textContent='✓ '+correct+'/'+seen;
  const nb=document.createElement('button'); nb.className='btn p'; nb.id='next';
  nb.textContent=(pos+1>=order.length)?'Vedi risultato →':'Prossima →'; nb.onclick=next;
  $('#row').appendChild(nb);
}
function focusTest(){ const t=document.querySelector('.test'); if(t) t.scrollIntoView({block:'start'}); }
function next(){ pos++; render(); focusTest(); }
function toggleImg(){
  const it=DATA[theme][order[pos]]; const w=$('#iw'); const b=$('#imgb');
  if(w.classList.contains('show')){ w.classList.remove('show'); b.textContent='🖼️ Mostra immagine'; }

}
function summary(){
  const pct=seen?Math.round(correct/seen*100):0;

  $('#card').innerHTML='<div class="summary"><div class="big">'+correct+' / '+seen+'</div>'+

    '<div class="row" style="justify-content:center"><button class="btn p" id="again">↻ Rifai il tema</button></div></div>';
  $('#again').onclick=()=>{ startTheme(theme); focusTest(); };
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>startTheme(t.dataset.t));
$('#restart').onclick=()=>{ startTheme(theme); focusTest(); };
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(!answered && ['a','b','c','d'].includes(k)) answer(['a','b','c','d'].indexOf(k));

});

<h1>Guida sintetica ai quiz — Caccia di selezione agli Ungulati · v1.3</h1>
<p class="lead">Copre i 3 moduli d'esame: <b>Modulo Base</b> · <b>Cacciatore di selezione</b> (cinghiale, capriolo, daino, muflone) · <b>Operatore abilitato ai Censimenti</b>. I valori <span class="hot">in rosso</span> sono i più richiesti nei quiz.</p>
<div class="v13"><b>Novità v1.3</b> — Contenuti incrociati e verificati con le <b>815 risposte ufficiali validate</b>. La v1.2 è risultata confermata quasi ovunque. Correzioni e integrazioni: <b>(1)</b> rapporto sessi nel prelievo: tutte le specie <b>50/50</b> tranne il <b>daino</b>, per cui l'esame dà due risposte in conflitto — <span class="fix">48-50/50-52</span> (id 259) e <span class="fix">55/45</span> (id 10262), vedi 1.10; <b>(2)</b> aggiunti i <b>coefficienti di valutazione del trofeo del daino</b> (vedi 4.6), tra cui "pugnali e punte" max <b>6</b>; <b>(3)</b> gestazione del cervo affinata a "circa 8-9 mesi".</div>

<h2>PARTE 1 — Confronto tra le specie (le 5 a colpo d'occhio)</h2>

<h2>PARTE 2 — Modulo Base e Parte comune</h2>

<h3>2.1 · Sistematica degli ungulati</h3>
<div class="cols2 small">
<p>Gli ungulati = un <b>SUPERORDINE</b>. Plantigradi / Digitigradi / Unguligradi sono <b>superordini</b>:</p>
<ul>
<li><b>Plantigradi</b>: animali lenti, onnivori, non specializzati; poggiano con tutta la pianta del piede.</li>
<li><b>Digitigradi</b>: adattati alla velocità di corsa, generalm. carnivori/predatori; poggiano sulle dita.</li>
<li><b>Unguligradi</b>: unghie molto sviluppate trasformate in zoccoli.</li>
</ul>
<p><b>ORDINI</b> (per n° dita):</p>
<ul>
<li><b>Artiodattili</b>: n° <b>PARI</b> di dita per arto (raram. 4, più spesso 2 = 3° e 4° dito). Persa la 1ª dita. Speroni/zoccoletti = atrofizzazioni del 2° e 5° dito.</li>
<li><b>Perissodattili</b>: n° <b>DISPARI</b> di dita (1 o 3, raram. 5).</li>
</ul>
<p><b>SOTTORDINE Ruminanti</b>: stomaco poligastrico a 4 camere = rumine (la più grande), reticolo, omaso, abomaso. Monogastrico = 1 camera (cinghiale).</p>
<p><b>Discriminazioni-chiave:</b></p>
<ul>
<li>Bovidi = corna a crescita continua; Cervidi = palchi decidui.</li>
<li>Suidi = 44 denti; Bovidi = 32 (cervo = 34).</li>
<li>Nessun ungulato selvatico ha incisivi superiori.</li>
<li>Selenodonti = molari a mezzaluna; Bunodonti = tubercoli a isolette (cinghiale).</li>
</ul>
</div>

<h3>2.2 · Ecologia — definizioni ricorrenti</h3>
<div class="cols2 small">
<ul>
<li><b>Ecosistema</b>: unità funzionale di base, componenti abiotiche + biotiche.</li>
<li><b>Biotopo</b>: componente fisica non vivente (luce, acqua, suolo).</li>
<li><b>Biocenosi</b>: componente vivente (produttori, consumatori, degradatori).</li>
<li><b>Ecotone</b>: zona di transizione tra due o più biocenosi (promiscuità di specie e ambienti).</li>
<li><b>Habitat</b>: insieme dei fattori (climatici, fisici, organici) del luogo in cui vive una specie.</li>
<li><b>Fattori limitanti</b>: fattori ambientali che influenzano negativamente crescita e fitness di una popolazione.</li>
</ul>
<p><b>Catena alimentare:</b></p>
<ul>
<li><b>Produttori</b> = piante verdi (autotrofi); trasformano energia potenziale in energia chimica assimilabile.</li>
<li><b>Consumatori primari</b> = erbivori (si nutrono degli autotrofi).</li>
<li><b>Consumatori 2°/3°</b> = carnivori.</li>
<li><b>Decompositori</b> = trasformano la sostanza organica in minerale.</li>
</ul>
</div>

<h3>2.3 · Dinamica e gestione delle popolazioni</h3>
<div class="cols2 small">
<ul>
<li><b>Struttura</b>: ripartizione per classi di sesso ed età in un preciso momento. Elemento gestionale più importante = rapporto fra classi di sesso e età.</li>
<li><b>Dinamica</b>: variazioni della struttura nel tempo (quali-quantitativa).</li>
<li><b>Consistenza</b>: entità numerica della popolazione.</li>
<li><b>Densità</b>: n° capi per unità di superficie (di norma 100 ha).</li>
<li><b>Capacità portante</b>: n° max di individui che l'habitat sostiene per tutta la durata del ciclo vitale.</li>
<li><b>Capacità faunistica</b>: n° specie e individui/specie che un territorio sostiene (dalle DB e DAF raggiungibili).</li>
<li><b>Max Densità Biotica (DB)</b>: n° oltre il quale compaiono segni di decadimento fisico e il reclutamento si azzera. Dipende da specie + ecosistema.</li>
<li><b>Max Densità Agro-Forestale (DAF)</b>: n° oltre il quale si hanno danni eccessivi a colture/selvicoltura. Da esigenze antropiche.</li>
<li><b>IUA = Reclutamento</b>: differenza netta, nell'unità di tempo, fra natalità e mortalità; accrescimento annuale degli effettivi. <span class="hot">Parametro fondamentale dei piani di prelievo.</span></li>
</ul>

<h3>2.4 · Conservazione, gestione, strategie alimentari</h3>
<div class="cols2 small">
<ul>
<li><b>Conservazione</b> = protezione attiva e passiva (può prevedere il "non intervento").</li>
<li><b>Gestione</b> = protezione attiva + utilizzo (parte attiva della conservazione).</li>
<li><b>Gestione faunistica</b>: massimizza benefici (ecologici, economici, ricreativi); su tutta la fauna.</li>
<li><b>Gestione venatoria</b>: massimizza benefici dal prelievo → piani di abbattimento.</li>
<li><b>Gestione integrata</b>: aspetti conservazionistici + venatori.</li>
</ul>
<p><b>Strategie alimentari:</b></p>
<ul>
<li><b>Brucatori</b>: rumine piccolo, fegato grande; foglie/germogli selezionati. <span class="hot">("rumine grande e fegato piccolo" è SBAGLIATA)</span></li>
<li><b>Pascolatori</b>: prevalentemente erbe e foraggi freschi.</li>
</ul>
</div>

<p><b>Appostamenti fissi — 2 categorie:</b></p>
<ul>
<li><b>A terra volanti</b>: schermature stagionali (ramaglie).</li>
<li><b>A terra stabili naturali</b>: alberi cavi, cespugli/massi.</li>
<li><b>A terra stabili artificiali</b>: "postini" (preferibile il legno).</li>
<li><b>Sopraelevati – palchetti</b>: la scala è parte integrante della struttura.</li>
<li><b>Sopraelevati – palchi/altane</b>: piattaforma robusta e funzionale.</li>
</ul>
<p>Posizionamento altana: sicurezza del tiro + propagazione/intensità della scia olfattiva. Ore migliori: prime ore di luce e prossime al tramonto.</p>

<h3>3.5 · Tiro: posizioni, dove/quando sparare, sicurezza</h3>
<table><thead><tr><th>Posizioni di tiro</th><th>Descrizione</th></tr></thead><tbody>
<tr><th>Statiche</th><td>l'arma appoggia completamente su punti stabili diversi dal tiratore (non comprende "in piedi").</td></tr>
<tr><th>Statico-dinamiche</th><td>l'arma appoggia in parte su punti stabili e in parte è sorretta dal tiratore.</td></tr>
<tr><th>Dinamiche</th><td>l'arma è sorretta totalmente dal tiratore, senza appoggio (non comprende "sdraiati").</td></tr>
</tbody></table>
<p class="tip">"Posizioni statico-acrobatiche" non esistono. Migliore prospettiva: animale di traverso, perpendicolare alla linea di mira e visibile totalmente. NON sparare se visibile solo parzialmente o se lo sfondo non è sicuro. Mirare di preferenza alla parte alta del cuore. In fila indiana: arma rivolta verso l'alto. Sicura: disattivarla solo subito prima dello sparo. NON lubrificare le cartucce.</p>

<h3>3.6 · Dopo il tiro, recupero e reazioni al colpo</h3>
<div class="note small"><b>Anschuss</b> = punto esatto dove si trovava l'animale al tiro: memorizzarlo prima di sparare. Dopo lo sparo: ricaricare, mettere in sicura, restare fermi ≥15 minuti osservando la reazione. Nell'avvicinamento non abbandonare mai il fucile. Se si sospetta un ferimento: raggiungere l'anschuss, segnalarlo, segnare la direzione di fuga. Contrassegno inamovibile: subito, al tendine d'Achille dell'arto posteriore, annullando la data.</div>
<table><thead><tr><th>Colpo</th><th>Reazione e sangue</th></tr></thead><tbody>
<tr><th>Cuore (basso, davanti)</th><td>minimo allontanamento dall'anschuss.</td></tr>
<tr><th>Poco sopra il cuore</th><td>balzo, breve corsa, crolla dopo decine di metri; sangue rosso leggerm. schiumoso.</td></tr>
<tr><th>Polmoni</th><td>può allontanarsi subito "illeso", anche fughe notevoli; sangue chiaro/schiumoso, spruzzi continui.</td></tr>
<tr><th>Fegato</th><td>vistoso inarcamento della schiena, allontanamento lento; sangue denso e scuro.</td></tr>
<tr><th>Reni</th><td>cedono gli arti posteriori, si rialza e si allontana lento; sangue scuro e annacquato.</td></tr>
<tr><th>Striscio schiena / ventre</th><td>schiena: crollo poi rialzo e fuga, pelo sull'anschuss. Ventre: balzo su 4 zampe e fuga velocissima, molto pelo.</td></tr>
<tr><th>Arti / muso / masse musc.</th><td>arti: caduta poi fuga, sangue scarso + schegge d'osso. Muso: sangue chiaro + frammenti ossei. Masse: sangue chiaro, ricerca inutile.</td></tr>
</tbody></table>

<h3>3.7 · Trattamento delle spoglie ed etica</h3>
<div class="cols2 small">
<ul>
<li><b>Frollatura</b>: in assenza di ossigeno il glicogeno (zucchero ematico) si trasforma in <b>acido lattico</b>; l'acido frena i batteri e attacca i legami proteici delle fibre.</li>
<li><b>Pesi</b>: pieno (intero) · sventrato (privo dell'apparato digerente sotto il diaframma) · vuoto.</li>
<li><b>Lunghezza mandibola</b>: dal punto mediano della cavità del 1° incisivo all'apofisi angolare. La lunghezza del collo non si rileva mai.</li>
<li>Il cacciatore è fruitore autorizzato di un patrimonio della collettività. L'abbattimento dev'essere preciso, rapido, indolore.</li>
<li>Bracconaggio = atto illegale e immorale.</li>
</ul>
<p><b>Piano di prelievo</b> (strumento comune a ogni forma di prelievo): obiettivi = aumento/diminuzione/mantenimento della consistenza + mantenimento/modifica della struttura. Consistenza = n° capi da abbattere dal confronto status↔obiettivi. Ripartizione per classi di sesso ed età. (l'IUA NON è un elemento del piano)</p>
</div>

<h3>4.6 · Trofeo, ciclo del palco e ormoni</h3>
<div class="cols2 small">
<p><b>Capriolo</b>: 3 punte — oculare (avanti), vertice (apicale), stocco (indietro). Forcuto avanti = manca lo stocco; forcuto indietro = manca l'oculare. Perle = escrescenze a goccia; rose = basi; steli = supporto osseo.</p>
<p><b>Cervo</b>: dal basso — oculare → ago → mediano → spina/punta post.; all'apice: forca (2) o corona (3+); vertice. Picozzi = incisivi centrali (I1); giogaia = peli sotto il collo del maschio.</p>
<p><b>Daino</b>: fusoni → balestroni (pala &lt;10 cm) → palanconi (pala &gt;10 cm). Pale = osso spugnoso (più soggetto a rotture). <b>Valutazione del trofeo</b>: media lunghezza <b>oculari ×0,25</b>; media lunghezza <b>stanghe ×0,5</b>; media larghezza <b>pale ×1,5</b>; punti "bellezza" → <b>colore</b> max 2, <span class="hot">pugnali e punte</span> max <span class="hot">6</span>.</p>
<p><b>Muflone</b> (corna, non palchi): 2 astucci cornei su zaffi frontali, perenni a crescita continua; abbozzi a ~4 mesi, sviluppo dal 4° mese. Anelli di pausa = segmenti annuali; n° anelli = segmenti − 1; 1° anello nel 2° anno; oltre il 4°-5° anno il diametro non aumenta; dal 7° anno crescita non più rilevabile. <b>Regresso</b> = diminuisce il calibro basale. Valutazione: diametro del cerchio in cui si inscrive la spirale.</p>
<div class="note"><b>Ormoni e palco (cervidi)</b>: il <b>testosterone</b> (testicoli) provoca l'ossificazione del palco e la caduta del velluto; quando cala, causa il distacco/caduta del palco e la ricrescita. La <b>somatotropina</b> (ipofisi) è l'ormone della crescita dei palchi, antagonista al testosterone (testosterone ↑ → somatotropina ↓). Trofeo "a parrucca" = mancata/insufficiente produzione di testosterone. I piccoli di bovidi e cervidi nascono privi di corna/palchi.</div>
</div>

<li><b>Fatte</b>: nerastre a salsiccia → masse rotondeggianti di 3-5 cm.</li>
</ul>
<p><b>Danni e difesa:</b> danno diretto = parti vegetali mangiate; indiretto = calpestio/scavo. Difesa più efficace = <b>barriere fisiche</b> (recinzioni); barriere ottiche/sagome = non realistiche. Repellenti chimici/acustici. Foraggiamento: naturale (turni dei cedui), seminaturale (colture "a perdere"), artificiale (governe). Danno da daino/capriolo/cervo = scortecciamento comportamentale (fregoni). Impronte cinghiale: 5-6 cm = subadulti; servono pochi cm di neve/fango e tempestività.</p>
</div>

<h3>4.9 · Dentizione: mascella, tipi di denti, sostituzioni</h3>
<table><thead><tr><th>&nbsp;</th><th>Capriolo</th><th>Cervo</th><th>Daino</th><th>Muflone</th><th>Cinghiale</th></tr></thead><tbody>
<tr><th>Mascella sup. (formula)</th><td>6 mol, 6 prem</td><td>6 mol, 6 prem, 2 can</td><td>6 mol, 6 prem</td><td>6 mol, 6 prem</td><td>6 mol, 8 prem, 2 can, 6 inc</td></tr>
<tr><th>Denti da latte alla nascita</th><td class="hot">22</td><td class="hot">22</td><td class="hot">20</td><td class="hot">20</td><td class="hot">8</td></tr>
<tr><th>1° molare (M1)</th><td>3-4 mesi</td><td>4-5 mesi</td><td>3-4 mesi</td><td>—</td><td>~6 mesi</td></tr>
<tr><th>Sostituz. 3° premolare</th><td>12-14 mesi</td><td>22-24 mesi</td><td>19-22 mesi</td><td>—</td><td>—</td></tr>
<tr><th>Sostituz. tutti i premolari</th><td>12-14 mesi</td><td>21-25 mesi</td><td>21-26 mesi</td><td>26-32 mesi</td><td>—</td></tr>
<tr><th>Dentatura definitiva completa</th><td>~14 mesi</td><td>oltre 24 mesi</td><td>entro 26 mesi</td><td>43-46 mesi</td><td>~3 anni</td></tr>
</tbody></table>
<p class="tip">Cinghiale: incisivi inferiori a scalpello (scavo); canini grandi e sporgenti = "difese" (bunodonti); molari bunodonti (tubercoli a isolette). Ultimo a comparire = <b>P1</b>; ultimo da latte sostituito = <b>I2</b> (col 3° molare). Canini superiori presenti solo in cervo e cinghiale. Daino: i premolari definitivi erompono dopo i molari. A dentatura completata l'unico criterio è il grado di usura. Diastema = spazio tra canini e premolari.</p>

<h3>4.10 · Ottica per il censimento · 4.11 Muta</h3>
<div class="cols2 small">
<ul>
<li><b>Binocolo 7×42</b> = 7 ingrandimenti, obiettivo 42 mm. <b>Cannocchiale 20-60×80</b> = ingr. 20-60, obiettivo 80 mm.</li>
<li><b>Pupilla d'uscita</b> = diametro obiettivo ÷ ingrandimenti (8×56 → 7).</li>
<li>Minore obiettivo → minore luminosità; più ingrandimenti → minore campo visivo. Prismi a tetto: lenti in asse.</li>
<li>Censimento sul "primo verde": binocolo 7-8× + cannocchiale ≥30×. Al bramito: schede, bussola, quadrante goniometrico, lampada.</li>
<li>Struttura di popolazione → metodo più usato = <b>a vista da punti fissi/vantaggiosi</b> (preferibile con boscosità &lt;50%).</li>
<li>Censimento a vista del muflone: periodo migliore = primavera (apr-mag), dopo i parti.</li>
</ul>
<table class="small"><thead><tr><th>Muta</th><th>est→inv</th><th>inv→est</th></tr></thead><tbody>
<tr><th>Capriolo</th><td>fine set–ott</td><td>fine mar–apr</td></tr>
<tr><th>Cervo</th><td>ottobre</td><td>aprile</td></tr>
<tr><th>Daino</th><td>fine ott–nov</td><td>aprile</td></tr>
<tr><th>Muflone</th><td>set–ott</td><td>fine apr–mag</td></tr>
<tr><th>Cinghiale</th><td>fine set–ott</td><td>fine apr–mag</td></tr>
</tbody></table>
<p class="tip">La muta avviene prima nei giovani, poi subadulti, adulti, infine i più vecchi/defedati (NON il contrario). Il mantello estivo del daino non melanico è l'unico tra gli ungulati a presentare la pomellatura.</p>
</div>

<script>
const VIEWS=['home','banca','focus','guida'];
const loaded={};
function show(v){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  VIEWS.forEach(k=>{ const el=document.getElementById('v-'+k); if(el) el.hidden=(k!==v); });
  if(v!=='home' && !loaded[v]){
    const raw=document.getElementById('src-'+v).textContent.split('__ENDSCRIPT__').join('<'+'/script>');
    const f=document.getElementById('v-'+v);
    const doc=f.contentWindow.document;
    doc.open(); doc.write(raw); doc.close();
    loaded[v]=true;
  }
  if(v!=='home'&&window.goatcounter&&window.goatcounter.count){window.goatcounter.count({path:'apri-'+v,event:true});}
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
document.querySelectorAll('.card').forEach(c=>c.onclick=()=>show(c.dataset.go));
show('home');
</script>
